# Pre-commit hooks. Install once, including the commit-msg stage:
#   uv run pre-commit install --hook-type pre-commit --hook-type commit-msg

# Lint/test/secret hooks run at the pre-commit stage only. The trailer strip
# below overrides this to run at commit-msg, so nothing runs twice per commit.
default_stages: [pre-commit]

repos:
  # Contribution is credited outside the commit trail, so no commit carries a
  # Co-authored-by trailer. This commit-msg hook strips it whatever adds it.
  - repo: local
    hooks:
      - id: strip-co-authored-by
        name: strip Co-Authored-By trailers
        language: system
        entry: python3 scripts/strip_coauthored_by.py
        stages: [commit-msg]

  # Lint + format. These call the project's own ruff through uv, so the
  # version matches CI exactly and there is no pre-commit-vs-CI skew.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check --fix
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types: [python]
        require_serial: true

      # Green-tree discipline: block a commit whose tests fail. Going
      # through `python -m pytest` forces the uv venv interpreter to drive
      # collection even if another pytest shim sits on PATH.
      - id: pytest
        name: pytest (fast-fail)
        language: system
        entry: uv run python -m pytest -q -x
        pass_filenames: false
        always_run: true

  # Secret scan on staged changes. The full-history scan lives in
  # `make gitleaks` and the CI security job.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
