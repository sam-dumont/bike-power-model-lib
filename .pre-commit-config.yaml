# Pre-commit hooks. Install once with: uv run pre-commit install
# (or `pre-commit install` if you have pre-commit on your PATH).

repos:
  # Lint + format. These call the project's own ruff through uv, so the
  # version matches CI exactly and there is no pre-commit-vs-CI skew.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check --fix
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types: [python]
        require_serial: true

      # Green-tree discipline: block a commit whose tests fail. Going
      # through `python -m pytest` forces the uv venv interpreter to drive
      # collection even if another pytest shim sits on PATH.
      - id: pytest
        name: pytest (fast-fail)
        language: system
        entry: uv run python -m pytest -q -x
        pass_filenames: false
        always_run: true

  # Secret scan on staged changes. The full-history scan lives in
  # `make gitleaks` and the CI security job.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
