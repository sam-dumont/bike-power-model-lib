name: Release

# Releases are tag-driven. Push a PEP 440 tag and this builds that exact
# version and publishes it to PyPI via trusted publishing (OIDC, no token).
#
#   git tag v0.0.1a0 && git push origin v0.0.1a0   # alpha
#   git tag v0.1.0b1 && git push origin v0.1.0b1    # beta
#   git tag v1.0.0   && git push origin v1.0.0      # final
#
# hatch-vcs reads the version straight from the tag, so the tag IS the
# version. A tag with an a/b/rc suffix is marked as a pre-release on GitHub;
# PyPI derives pre-release status from the version string itself.
#
# See docs/RELEASING.md for the one-time PyPI trusted-publisher setup.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only, do not publish (uses the current ref, not a tag)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    if: github.repository == 'sam-dumont/bike-power-model-lib'
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv python install 3.13

      - name: Build
        run: uv build

      - name: Read built version + classify pre-release
        id: meta
        run: |
          VERSION=$(uv run --isolated --no-project --with dist/bike_power_model-*.whl \
            python -c "import bike_power_model as m; print(m.__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" =~ (a|b|rc)[0-9]+ || "$VERSION" == *dev* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Built version: $VERSION"
          ls -la dist/

      - name: Wheel install smoke
        run: |
          uv run --isolated --no-project \
            --with dist/bike_power_model-*.whl \
            python scripts/wheel_smoke.py

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  github-release:
    name: GitHub release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: v${{ needs.build.outputs.version }}
          prerelease: ${{ needs.build.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  pypi-publish:
    name: Publish to PyPI
    needs: [build]
    # Only real tag pushes publish. A workflow_dispatch dry run stops at build.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/bike-power-model/
    permissions:
      # Trusted publishing: PyPI mints a short-lived token from this OIDC
      # identity. No API token is stored in the repo.
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
