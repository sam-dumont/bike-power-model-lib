name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - run: uv python install ${{ matrix.python-version }}

      # --frozen pins to uv.lock; any drift between pyproject.toml and the
      # lock fails CI rather than silently resolving something new.
      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint
        if: matrix.python-version == '3.13'
        run: uv run ruff check src/ tests/ scripts/

      - name: Format check
        if: matrix.python-version == '3.13'
        run: uv run ruff format --check src/ tests/ scripts/

      - name: Test
        run: uv run pytest --cov=bike_power_model --cov-report=term-missing

  offline:
    name: Offline gate
    runs-on: ubuntu-latest
    # The library core must import and run with no network reachable. This
    # runs the suite with sockets blocked; a module that reached out at
    # import time would fail here. It stays green for every release.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --frozen --extra dev
      - name: pytest (sockets blocked)
        run: uv run pytest --disable-socket

  security:
    name: Supply chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the secret scan covers past commits, not just HEAD.
          fetch-depth: 0

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true

      - run: uv python install 3.13
      - run: uv sync --frozen --extra dev

      - name: pip-audit (dependency CVEs)
        run: |
          uv export --frozen --no-emit-project --format requirements-txt -o audit-requirements.txt
          uvx pip-audit -r audit-requirements.txt

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build + wheel smoke
    needs: [quality, offline, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # hatch-vcs derives the version from tags, so fetch them.
          fetch-depth: 0
          fetch-tags: true

      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - run: uv python install 3.13

      - run: uv build

      # Install the freshly built wheel into an isolated env (no source tree
      # on sys.path) and exercise the import paths production reads. Catches
      # undeclared runtime deps and missing package data that the source-tree
      # test suite cannot see.
      - name: Wheel install smoke
        run: |
          uv run --isolated --no-project \
            --with dist/bike_power_model-*.whl \
            python scripts/wheel_smoke.py

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
